<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de senha</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome para ícones (opcional, mas elegante) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* pequenos ajustes para melhor experiência */
        .parametro-senha__texto {
            min-width: 3rem;
            text-align: center;
        }
        .forca-indicador {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .forca-barra {
            flex: 1;
            height: 10px;
            background: #1e3a5f;
            border-radius: 8px;
            overflow: hidden;
            min-width: 80px;
        }
        .forca-barra span {
            display: block;
            height: 100%;
            width: 0%;
            background: #0075FF;
            border-radius: 8px;
            transition: width 0.2s ease;
        }
        .forca-texto {
            font-family: var(--roboto-mono);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            color: #b0c4de;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.5rem;
            margin: 0.5rem 0 0.25rem 0;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #0075FF;
            cursor: pointer;
        }
        .parametro-senha__botao:active {
            transform: scale(0.94);
        }
        #campo-senha {
            letter-spacing: 1px;
        }
        .acao-copiar {
            background: transparent;
            border: none;
            color: var(--branco);
            font-size: 1.6rem;
            cursor: pointer;
            padding: 0 8px;
            transition: 0.2s;
            vertical-align: middle;
        }
        .acao-copiar:hover {
            color: #0075FF;
            transform: scale(1.1);
        }
        .conteudo-senha {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.25rem 0.75rem;
        }
        .conteudo-senha label {
            font-size: 1.1rem;
            opacity: 0.8;
        }
        #campo-senha {
            flex: 1;
            min-width: 180px;
        }
        @media screen and (max-width: 600px) {
            .parametro-coluna__senha {
                flex-direction: column !important;
                gap: 1.5rem;
            }
            .parametro-senha {
                width: 100% !important;
            }
        }
    </style>
</head>

<body>
    <section class="conteudo">
        <div class="conteudo-titulo">
            <img src="unlock.svg" alt="cadeado fechado" style="width: 64px; filter: invert(1);">
            <h2 class="titulo-principal">Gerador de senhas</h2>
            <h3 class="titulo-secundario">Gere instantaneamente uma senha aleatória e segura</h3>
        </div>
        <div class="conteudo-senha">
            <label for="senha"><i class="fas fa-key"></i> Senha</label>
            <input name="senha" type="text" id="campo-senha" readonly>
            <button class="acao-copiar" id="copiar-senha" title="Copiar senha"><i class="far fa-copy"></i></button>
        </div>
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <!-- Coluna 1: Número de caracteres -->
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo"><i class="fas fa-text-height"></i> Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao" id="btn-menos">−</button>
                        <p class="parametro-senha__texto" id="tamanho-senha">12</p>
                        <button class="parametro-senha__botao" id="btn-mais">+</button>
                    </div>
                </div>
                <!-- Coluna 2: Características (checkboxes) -->
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo"><i class="fas fa-list-ul"></i> Características</h4>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="chk-maiusculas" checked> A-Z</label>
                        <label><input type="checkbox" id="chk-minusculas" checked> a-z</label>
                        <label><input type="checkbox" id="chk-numeros" checked> 0-9</label>
                        <label><input type="checkbox" id="chk-simbolos" checked> !@#$%</label>
                    </div>
                </div>
                <!-- Coluna 3: Força da senha -->
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo"><i class="fas fa-shield-alt"></i> Força da senha</h4>
                    <div class="forca-indicador">
                        <div class="forca-barra"><span id="forca-barra-preencher" style="width: 0%;"></span></div>
                        <span class="forca-texto" id="forca-rotulo">Fraca</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="main.js"></script>
</body>

</html>
